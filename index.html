<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Shop</title>
    <style>
        /* Цвета */
        body {
            background: #e9e9e9;
            font-family: Arial;
            margin: 40px 20px;
        }

        /* Карточка товара */
        #main {
            background: white;
            max-width: 350px;
            margin: 0 auto;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        /* Заголовок */
        h1 {
            color: black;
            font-size: 28px;
            margin-top: 0;
        }

        /* Картинка */
        img {
            width: 120px;
            height: 120px;
        }

        /* Описание */
        p {
            color: gray;
            font-size: 15px;
            line-height: 1.5;
            margin: 20px 0;
        }

        /* Кнопка */
        #buy {
            background: blue;
            color: white;
            font-size: 18px;
            padding: 12px 35px;
            border: none;
            border-radius: 8px;
        }

        /* Эффект при наведении */
        #buy:hover {
            background: darkblue;
        }
    </style>
</head>
<body>
    <div id="main">
        <h1>Онлайн магазин</h1>
        <img src="https://cdn-icons-png.flaticon.com/512/3595/3595455.png">
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Accusantium ipsum magni, molestias.</p>
        <button id="buy">Купить</button>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
