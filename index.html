<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Shop</title>
    <style>
        /* Цвета */
        body {
            background: #e9e9e9;
            font-family: Arial;
            margin: 40px 20px;
        }

        /* Карточка товара */
        #main {
            background: white;
            max-width: 350px;
            margin: 0 auto;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        /* Заголовок */
        h1 {
            color: black;
            font-size: 28px;
            margin-top: 0;
        }

        /* Картинка */
        img {
            width: 120px;
            height: 120px;
        }

        /* Описание */
        p {
            color: gray;
            font-size: 15px;
            line-height: 1.5;
            margin: 20px 0;
        }

        /* Кнопка */
        #buy {
            background: blue;
            color: white;
            font-size: 18px;
            padding: 12px 35px;
            border: none;
            border-radius: 8px;
        }

        /* Эффект при наведении */
        #buy:hover {
            background: darkblue;
        }

        /* стиль дня кнопок номер емаел имя*/
        #form{
            display: none;
            text-align: center;
        }

        input{
            width: 90%;
            outline: none;
            margin: 10px 5%;
            padding: 15px 10px;
            font-size: 14px;
            border: 2px solid silver;
            border-radius: 5px;
        }

        input:focus{
            border-color: #db5d5d;
        }
    </style>
</head>
<body>
    <div id="main">
        <h1>Онлайн магазин</h1>
        <img src="https://cdn-icons-png.flaticon.com/512/3595/3595455.png">
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Accusantium ipsum magni, molestias.</p>
        <button id="buy">Купить</button>
    </div>
    <form id="form">
        <input type="text" placeholder="Имя" id="user_name">
        <input type="text" placeholder="Email" id="user_email">
        <input type="text" placeholder="Телефон" id="user_phone">
        <div id = "error"></div>
        <button id="order">Оформить</button>
    </form>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        let buy = document.getElementById("buy");
        let order = document.getElementById("order");

        buy.addEventListener("click", ()=> {
            document.getElementById("main").style.display="none";
            document.getElementById("form").style.display="block";
            document.getElementById("user_name").value = tg.initDataUnsafe.user.first_name + " " + tg.initDataUnsafe.user.last_name;
        })

        order.addEventListener("click", () => {
            document.getElementById("error").innerText = " ";            
            let name =  document.getElementById("user_name").value.trim();
            let email =  document.getElementById("user_name").value.trim();
            let phone =  document.getElementById("user_name").value.trim();

            if(name.length < 5) {
                document.getElementById("error").innerText = "Ошибка в имени";
                return;
            }

            if(email.length < 5  || !email.includes('@')) {
                document.getElementById("error").innerText = "Ошибка в email";
                return;
            }

            if(phone.length < 5) {
                document.getElementById("error").innerText = "Ошибка в номере телефона";
                return;
            }

            let data = {
                name: name,
                email: email,
                phone: phone
            }
            tg.sendData(JSON.stringify(data));



            tg.close();
        })
    </script>
</body>
</html>
